<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- ═══ HEAD ═══ -->
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${title} + ' — Bolsa'">Bolsa</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        body { background-color: #f8f9fa; }
        .navbar-brand { font-weight: 700; letter-spacing: .5px; }
        .table th { white-space: nowrap; }
        .badge-buy  { background-color: #198754; }
        .badge-sell { background-color: #dc3545; }
        .gain-pos   { color: #198754; font-weight: 600; }
        .gain-neg   { color: #dc3545; font-weight: 600; }
    </style>
</head>

<!-- ═══ NAVBAR ═══ -->
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/dashboard">
            <i class="bi bi-graph-up-arrow me-1"></i>Bolsa
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/dashboard"><i class="bi bi-house me-1"></i>Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/operations"><i class="bi bi-list-ul me-1"></i>Operaciones</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/sales"><i class="bi bi-receipt me-1"></i>Ventas AEAT</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/splits"><i class="bi bi-scissors me-1"></i>Splits</a>
                </li>
            </ul>
            <div class="d-flex gap-2 align-items-center">
                <a class="btn btn-outline-light btn-sm" href="/splits/new">
                    <i class="bi bi-scissors me-1"></i>Nuevo split
                </a>
                <a class="btn btn-success btn-sm" href="/operations/new">
                    <i class="bi bi-plus-lg me-1"></i>Nueva operación
                </a>
                <form th:action="@{/logout}" method="post" class="mb-0">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-outline-danger btn-sm">
                        <i class="bi bi-box-arrow-right"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>
</nav>

<!-- ═══ SCRIPTS ═══ -->
<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</div>

</html>
