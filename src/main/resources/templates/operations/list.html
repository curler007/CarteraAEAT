<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head('Operaciones')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container-fluid px-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0"><i class="bi bi-list-ul me-2"></i>Historial de operaciones</h4>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Filtros -->
    <div class="d-flex gap-2 align-items-center mb-3 flex-wrap">
        <div class="input-group" style="max-width: 220px;">
            <span class="input-group-text"><i class="bi bi-search"></i></span>
            <input type="text" id="tickerFilter" class="form-control text-uppercase"
                   placeholder="Ticker..." autocomplete="off"/>
        </div>
        <div class="input-group" style="max-width: 220px;">
            <span class="input-group-text"><i class="bi bi-bank"></i></span>
            <input type="text" id="brokerFilter" class="form-control"
                   placeholder="Broker..." list="brokerFilterList" autocomplete="off"/>
            <datalist id="brokerFilterList">
                <option value="Trade Republic"/>
                <option value="ING"/>
                <option value="MyInvestor"/>
            </datalist>
        </div>
        <button class="btn btn-outline-secondary btn-sm" id="clearFilter" style="display:none;">
            <i class="bi bi-x-lg"></i> Limpiar
        </button>
        <span class="text-muted small" id="filterCount"></span>
        <div id="filterSummary" class="ms-auto d-none d-flex gap-3 align-items-center
                                       bg-dark text-white rounded px-3 py-1 small">
            <span>Cantidad: <strong id="sumCantidad">—</strong></span>
            <span>Valor coste: <strong id="sumCoste">—</strong> €</span>
            <span>Valor actual: <strong id="sumValor">—</strong> €</span>
            <span>Diferencia: <strong id="sumDiff">—</strong></span>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0" id="opsTable">
                <thead class="table-dark">
                <tr>
                    <th>Fecha</th>
                    <th>Tipo</th>
                    <th>Ticker</th>
                    <th>Nombre</th>
                    <th>Broker</th>
                    <th class="text-end">Cantidad</th>
                    <th class="text-end">Precio (€)</th>
                    <th class="text-end">Comisión (€)</th>
                    <th class="text-end">Total (€)</th>
                    <th class="text-end">Actual (€)</th>
                    <th class="text-end">Saldo</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <th:block th:each="row : ${history}">

                    <!-- Fila de SPLIT -->
                    <tr th:if="${row.split != null}"
                        class="table-warning"
                        th:attr="data-ticker=${row.split.ticker},data-is-split=true">
                        <td th:text="${#temporals.format(row.split.date, 'dd/MM/yyyy')}"></td>
                        <td>
                            <span class="badge bg-warning text-dark">
                                Split ×<span th:text="${row.split.ratio.stripTrailingZeros().toPlainString()}"></span>
                            </span>
                        </td>
                        <td><strong th:text="${row.split.ticker}"></strong></td>
                        <td colspan="8" class="text-muted small">División de acciones</td>
                        <td class="text-end">
                            <div class="d-flex gap-1 justify-content-end">
                                <a th:href="@{/splits/{id}/edit(id=${row.split.id})}"
                                   class="btn btn-outline-secondary btn-sm">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <form th:action="@{/splits/{id}/delete(id=${row.split.id})}" method="post"
                                      onsubmit="return confirm('¿Eliminar este split?');">
                                    <button type="submit" class="btn btn-outline-danger btn-sm">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>

                    <!-- Fila de OPERACIÓN -->
                    <tr th:if="${row.operation != null}"
                        th:attr="data-isin=${row.operation.assetName},data-qty=${row.operation.quantity},data-total=${row.operation.total},data-remaining=${lotRemainingQty[row.operation.id] ?: row.operation.quantity},data-remaining-cost=${lotRemainingCost[row.operation.id] ?: row.operation.total}"
                        th:classappend="${row.operation.pending} ? 'table-danger' : (${row.operation.type.name() == 'SELL'} ? 'table-secondary' : (${lotRowClass[row.operation.id]} ?: ''))">
                        <td th:text="${#temporals.format(row.operation.date, 'dd/MM/yyyy')}"></td>
                        <td>
                            <span th:if="${row.operation.type.name() == 'BUY'}"
                                  class="badge badge-buy">Compra</span>
                            <span th:if="${row.operation.type.name() == 'SELL'}"
                                  class="badge badge-sell">Venta</span>
                            <span th:if="${row.operation.type.name() == 'CANJE'}"
                                  class="badge bg-info text-dark">Canje</span>
                            <span th:if="${row.operation.pending}"
                                  class="badge bg-warning text-dark ms-1"
                                  th:text="'⏳ ' + ${@fmt.qty(row.operation.pendingQty)}">
                            </span>
                        </td>
                        <td><strong th:text="${row.operation.ticker}"></strong></td>
                        <td th:text="${row.operation.assetName}"></td>
                        <td th:text="${row.operation.broker}"></td>
                        <td class="text-end" th:text="${@fmt.qty(row.operation.quantity)}"></td>
                        <td class="text-end" th:text="${#numbers.formatDecimal(row.operation.price, 1, 4)}"></td>
                        <td class="text-end" th:text="${#numbers.formatDecimal(row.operation.commission, 1, 2)}"></td>
                        <td class="text-end"><strong th:text="${#numbers.formatDecimal(row.operation.total, 1, 2)}"></strong></td>
                        <td class="text-end text-muted small cell-valor">…</td>
                        <td class="text-end text-muted"
                            th:if="${row.operation.type.name() != 'SELL'}"
                            th:text="${@fmt.qty(runningBalance[row.operation.id])}"></td>
                        <td class="text-end text-muted"
                            th:if="${row.operation.type.name() == 'SELL'}"
                            th:text="${@fmt.qty(runningBalance[row.operation.id])}"
                            th:attr="data-bs-toggle=${sellTooltip[row.operation.id] != null ? 'tooltip' : ''},
                                     data-bs-html='true',
                                     data-bs-title=${sellTooltip[row.operation.id]}">
                        </td>
                        <td class="text-end">
                            <div class="d-flex gap-1 justify-content-end">
                                <a th:href="@{/operations/{id}/edit(id=${row.operation.id})}"
                                   class="btn btn-outline-secondary btn-sm">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <form th:action="@{/operations/{id}/delete(id=${row.operation.id})}"
                                      method="post"
                                      onsubmit="return confirm('¿Eliminar esta operación?');">
                                    <button type="submit" class="btn btn-outline-danger btn-sm">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>

                </th:block>
                <tr th:if="${#lists.isEmpty(history)}">
                    <td colspan="13" class="text-center text-muted py-3">Sin operaciones. <a href="/operations/new">Registra la primera</a>.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
<script>
    document.querySelectorAll('[data-bs-toggle="tooltip"]').forEach(el => {
        new bootstrap.Tooltip(el);
    });

    const tickerFilter  = document.getElementById('tickerFilter');
    const brokerFilter  = document.getElementById('brokerFilter');
    const clearBtn      = document.getElementById('clearFilter');
    const countLabel    = document.getElementById('filterCount');
    const filterSummary = document.getElementById('filterSummary');
    const sumCantidad   = document.getElementById('sumCantidad');
    const sumCoste      = document.getElementById('sumCoste');
    const sumValor      = document.getElementById('sumValor');
    const sumDiff       = document.getElementById('sumDiff');

    // Cachear ticker y broker en data-attributes al cargar
    document.querySelectorAll('#opsTable tbody tr').forEach(row => {
        // Splits ya tienen data-ticker en el HTML; sólo cachear broker para operaciones
        if (!row.dataset.isSplit) {
            if (row.cells[2]) row.dataset.ticker = row.cells[2].textContent.trim().toUpperCase();
            if (row.cells[4]) row.dataset.broker = row.cells[4].textContent.trim().toUpperCase();
        }
    });

    function parseNum(text) {
        const n = parseFloat(text.replace(/[^0-9.,\-]/g, '').replace(',', '.'));
        return isNaN(n) ? null : n;
    }

    function updateSummary() {
        const hasFilter = tickerFilter.value.trim() || brokerFilter.value.trim();
        if (!hasFilter) { filterSummary.classList.add('d-none'); sumDiff.style.color = ''; return; }

        let totalCantidad = 0, totalCoste = 0, totalValor = 0, valorLoaded = true;
        document.querySelectorAll('#opsTable tbody tr').forEach(row => {
            if (row.style.display === 'none' || !row.dataset.ticker) return;
            if (row.dataset.isSplit) return;
            // Excluir ventas y compras totalmente consumidas
            if (row.classList.contains('table-secondary') ||
                row.classList.contains('table-danger'))   return;
            const remaining     = parseFloat(row.dataset.remaining);
            if (!remaining || remaining <= 0) return;
            const remainingCost = parseFloat(row.dataset.remainingCost);
            const valor         = parseNum(row.querySelector('.cell-valor')?.textContent);
            totalCantidad += remaining;
            if (!isNaN(remainingCost)) totalCoste += remainingCost;
            if (valor !== null) totalValor += valor;
            else valorLoaded = false;
        });

        sumCantidad.textContent = totalCantidad.toFixed(4).replace(/\.?0+$/, '');
        sumCoste.textContent    = totalCoste.toFixed(2);
        sumValor.textContent    = valorLoaded ? totalValor.toFixed(2) : totalValor.toFixed(2) + ' *';

        const diff = totalValor - totalCoste;
        const sign = diff >= 0 ? '+' : '';
        sumDiff.textContent    = sign + diff.toFixed(2) + ' €' + (valorLoaded ? '' : ' *');
        sumDiff.style.color    = diff >= 0 ? '#198754' : '#dc3545';

        filterSummary.classList.remove('d-none');
    }

    function applyFilter() {
        const ticker = tickerFilter.value.trim().toUpperCase();
        const broker = brokerFilter.value.trim().toUpperCase();
        let visible = 0;

        document.querySelectorAll('#opsTable tbody tr').forEach(row => {
            if (!row.dataset.ticker) return;
            const matchTicker = !ticker || row.dataset.ticker.includes(ticker);
            // Splits no tienen broker; si hay filtro de broker, los splits siguen visibles si su ticker encaja
            const matchBroker = !broker || row.dataset.isSplit || row.dataset.broker.includes(broker);
            const show = matchTicker && matchBroker;
            row.style.display = show ? '' : 'none';
            if (show && !row.dataset.isSplit) visible++;
        });

        const hasFilter = ticker || broker;
        clearBtn.style.display = hasFilter ? '' : 'none';
        countLabel.textContent = hasFilter ? (visible === 1 ? '1 operación' : visible + ' operaciones') : '';
        updateSummary();
    }

    // Restaurar filtro guardado en sesión
    tickerFilter.value = sessionStorage.getItem('ops.tickerFilter') || '';
    brokerFilter.value = sessionStorage.getItem('ops.brokerFilter') || '';
    applyFilter();

    tickerFilter.addEventListener('input', () => {
        sessionStorage.setItem('ops.tickerFilter', tickerFilter.value);
        applyFilter();
    });
    brokerFilter.addEventListener('input', () => {
        sessionStorage.setItem('ops.brokerFilter', brokerFilter.value);
        applyFilter();
    });
    clearBtn.addEventListener('click', () => {
        tickerFilter.value = '';
        brokerFilter.value = '';
        sessionStorage.removeItem('ops.tickerFilter');
        sessionStorage.removeItem('ops.brokerFilter');
        applyFilter();
        tickerFilter.focus();
    });

    // ── Valor actual (cierre anterior × cantidad) ──────────────────────────
    // Agrupar filas por ISIN para hacer una sola llamada por ticker
    const rowsByIsin = new Map();
    document.querySelectorAll('tr[data-isin]:not([data-is-split])').forEach(row => {
        const isin = row.dataset.isin;
        if (!rowsByIsin.has(isin)) rowsByIsin.set(isin, []);
        rowsByIsin.get(isin).push(row);
    });

    rowsByIsin.forEach(async (rows, isin) => {
        const cell = row => row.querySelector('.cell-valor');
        try {
            const resp = await fetch(`/api/quote?isin=${encodeURIComponent(isin)}`);
            if (!resp.ok) { rows.forEach(r => { cell(r).textContent = '—'; }); return; }

            const q = await resp.json();
            const inEur = q.originalCurrency === 'EUR' || q.convertedToEur;
            rows.forEach(r => {
                // Usar remaining (post-split) para el valor actual, total para comparar coste
                const qty   = parseFloat(r.dataset.remaining);
                const total = parseFloat(r.dataset.remainingCost);
                const valor = qty * q.price;
                const c     = cell(r);
                c.classList.remove('text-muted');
                c.textContent = inEur
                    ? valor.toFixed(2) + (q.convertedToEur ? ' *' : '')
                    : valor.toFixed(2) + ' ' + q.originalCurrency;
                const diff = (100 * (valor - total) / total).toFixed(2);
                c.textContent = c.textContent + ' (' + diff + '%)';
                if (inEur) {
                    c.style.color      = valor >= total ? '#198754' : '#dc3545';
                    c.style.fontWeight = '600';
                }
            });
            updateSummary();
        } catch {
            rows.forEach(r => { cell(r).textContent = '❌'; });
        }
    });
</script>
</body>
</html>
