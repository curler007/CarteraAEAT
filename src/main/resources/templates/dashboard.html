<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head('Dashboard')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">

    <!-- Alertas flash -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <h4 class="mb-3"><i class="bi bi-briefcase me-2"></i>Cartera actual</h4>

    <div th:if="${#lists.isEmpty(portfolio)}" class="alert alert-info">
        No hay posiciones abiertas. <a href="/operations/new">Registra tu primera compra</a>.
    </div>

    <div class="card shadow-sm mb-4" th:unless="${#lists.isEmpty(portfolio)}">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark">
                <tr>
                    <th>Nombre</th>
                    <th>ISIN</th>
                    <th class="text-end">Cantidad</th>
                    <th class="text-end">Coste total (€)</th>
                    <th class="text-end">% cartera</th>
                    <th class="text-end">Precio medio (€)</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${portfolio}">
                    <td><strong th:text="${item.ticker()}"></strong></td>
                    <td th:text="${item.assetName()}"></td>
                    <td class="text-end" th:text="${@fmt.qty(item.totalQty())}"></td>
                    <td class="text-end" th:text="${#numbers.formatDecimal(item.totalCost(), 1, 2)}"></td>
                    <td class="text-end" th:text="${#numbers.formatDecimal(portfolioPercent[item.ticker()], 1, 2) + ' %'}"></td>
                    <td class="text-end" th:text="${#numbers.formatDecimal(item.avgCost(), 1, 4)}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <h4 class="mb-3"><i class="bi bi-clock-history me-2"></i>Últimas operaciones</h4>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark">
                <tr>
                    <th>Fecha</th>
                    <th>Tipo</th>
                    <th>Nombre</th>
                    <th>ISIN</th>
                    <th class="text-end">Cantidad</th>
                    <th class="text-end">Precio (€)</th>
                    <th class="text-end">Total (€)</th>
                    <th>Broker</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="op : ${recentOps}">
                    <td th:text="${#temporals.format(op.date, 'dd/MM/yyyy')}"></td>
                    <td>
                        <span th:if="${op.type.name() == 'BUY'}"
                              class="badge badge-buy">Compra</span>
                        <span th:unless="${op.type.name() == 'BUY'}"
                              class="badge badge-sell">Venta</span>
                    </td>
                    <td><strong th:text="${op.ticker}"></strong></td>
                    <td th:text="${op.assetName}"></td>
                    <td class="text-end" th:text="${@fmt.qty(op.quantity)}"></td>
                    <td class="text-end" th:text="${#numbers.formatDecimal(op.price, 1, 4)}"></td>
                    <td class="text-end" th:text="${#numbers.formatDecimal(op.total, 1, 2)}"></td>
                    <td th:text="${op.broker}"></td>
                </tr>
                <tr th:if="${#lists.isEmpty(recentOps)}">
                    <td colspan="8" class="text-center text-muted py-3">Sin operaciones registradas.</td>
                </tr>
                </tbody>
            </table>
        </div>
        <div class="card-footer text-end">
            <a href="/operations" class="btn btn-outline-secondary btn-sm">Ver todas</a>
        </div>
    </div>

</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
