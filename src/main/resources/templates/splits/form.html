<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head('Split')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container" style="max-width: 480px;">

    <h4 class="mb-4">
        <i class="bi bi-scissors me-2"></i>
        <span th:text="${editId != null} ? 'Editar split' : 'Nuevo split'"></span>
    </h4>

    <div class="card shadow-sm">
        <div class="card-body">
            <form th:action="${editId != null} ? @{/splits/{id}/edit(id=${editId})} : @{/splits}"
                  th:object="${form}" method="post">

                <div class="mb-3">
                    <label class="form-label">Fecha</label>
                    <input type="date" class="form-control"
                           th:field="*{date}"
                           th:classappend="${#fields.hasErrors('date')} ? 'is-invalid'"/>
                    <div class="invalid-feedback" th:errors="*{date}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Ticker</label>
                    <input type="text" class="form-control text-uppercase"
                           th:field="*{ticker}" placeholder="Ej: NFLX"
                           th:classappend="${#fields.hasErrors('ticker')} ? 'is-invalid'"
                           list="tickerList" autocomplete="off"/>
                    <datalist id="tickerList"></datalist>
                    <div class="invalid-feedback" th:errors="*{ticker}"></div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Ratio multiplicador</label>
                    <input type="number" class="form-control"
                           th:field="*{ratio}" placeholder="Ej: 10"
                           step="0.0001" min="0.0001"
                           th:classappend="${#fields.hasErrors('ratio')} ? 'is-invalid'"/>
                    <div class="form-text">Factor por el que se multiplican las acciones. Un split 1:10 = ratio 10.</div>
                    <div class="invalid-feedback" th:errors="*{ratio}"></div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success">
                        <i class="bi bi-check-lg me-1"></i>Guardar
                    </button>
                    <a href="/splits" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
<script>
    // Autocompletar tickers conocidos
    fetch('/operations/ticker-names')
        .then(r => r.json())
        .then(map => {
            const dl = document.getElementById('tickerList');
            Object.keys(map).forEach(t => {
                const opt = document.createElement('option');
                opt.value = t;
                dl.appendChild(opt);
            });
        });

    document.querySelector('input[name="ticker"]').addEventListener('input', function () {
        this.value = this.value.toUpperCase();
    });
</script>
</body>
</html>
