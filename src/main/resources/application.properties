spring.application.name=bolsa

# SQLite
spring.datasource.url=jdbc:sqlite:bolsa.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

logging.level.com.raul.bolsa=DEBUG

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

server.port=8080

# Autenticación (cambia estos valores antes de exponer en internet)
app.security.username=admin
app.security.password=changeme